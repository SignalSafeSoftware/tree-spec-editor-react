name: CI

on:
    workflow_dispatch:
    push:
        branches: [main]
        tags: ["v*"]
    pull_request:
        branches: [main, develop]
        types: [opened, synchronize, reopened]

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: "24"

jobs:
    checks:
        name: Checks
        runs-on: ubuntu-latest
        container: node:24-alpine
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Enable Yarn
              run: corepack enable

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Typecheck
              run: yarn typecheck

    tests:
        name: Tests
        runs-on: ubuntu-latest
        container: node:24-alpine
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Enable Yarn
              run: corepack enable

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Unit tests with coverage
              run: yarn test --coverage

            - name: Upload coverage
              uses: actions/upload-artifact@v7
              with:
                  name: coverage
                  path: coverage/lcov.info
                  if-no-files-found: error

    scan:
        name: Scan
        needs: [tests]
        if: |
            github.event_name == 'workflow_dispatch' ||
            github.event_name == 'push' ||
            (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'scan'))
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        env:
            SONAR_TOKEN: ${{ secrets.PACKAGES_SONAR_TOKEN }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Enable Yarn
              run: corepack enable

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Unit tests with coverage
              run: yarn test --coverage

            - name: Verify coverage report
              run: |
                  test -f coverage/lcov.info
                  grep '^SF:src/' coverage/lcov.info

            - name: SonarCloud scan
              uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e

            - name: Sonar PR comment
              if: github.event_name == 'pull_request'
              uses: actions/github-script@v9
              with:
                  script: |
                      const body = `SonarCloud analysis for \`@signalsafe/tree-spec-editor-react\` (\`signalsafe-package-tree-spec-editor-react\`) completed with result \`${{ job.status }}\`.`;
                      await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                      });

    smoke-package:
        name: Smoke package
        needs: [checks, tests]
        runs-on: ubuntu-latest
        container: node:24-alpine
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Enable Yarn
              run: corepack enable

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Smoke-test packed artifact
              run: yarn smoke:package

    publish:
        name: Publish
        needs: [checks, tests, scan, smoke-package]
        if: |
            (
              (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
              (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
            ) &&
            needs.checks.result == 'success' &&
            needs.tests.result == 'success' &&
            needs.scan.result == 'success'
        runs-on: ubuntu-latest
        container: node:24-alpine
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Enable Yarn
              run: corepack enable

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Verify artifact before publish
              run: yarn smoke:package

            - name: Check package version
              run: node -e "const p=require('./package.json'); console.log(p.name, p.version)"

            - name: Configure npm auth
              run: |
                echo "registry=https://registry.npmjs.org/" > ~/.npmrc
                echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
              env:
                NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish to npm
              run: npm publish --access public --ignore-scripts
              env:
                NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
